<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Symmetry454</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #10121a;
    --panel: #171a25;
    --panel-raised: #1d212e;
    --grid-line: #272c3c;
    --text: #ede9de;
    --text-dim: #868ba0;
    --brass: #c9a227;
    --teal: #4fb3a9;
    --coral: #e2704a;
    --red: #ef5350;
    --gold: #f5c518;
    --radius: 10px;
  }
  *{ box-sizing: border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display:flex;
    justify-content:center;
    padding: 28px 14px 60px;
    -webkit-tap-highlight-color: transparent;
  }
  #app{ width:100%; max-width: 480px; }

  .mast{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--grid-line);
    margin-bottom: 10px;
  }
  .mast-title{
    font-family:'JetBrains Mono', monospace;
    font-weight:700;
    font-size: 20px;
    letter-spacing: 0.14em;
    color: var(--brass);
  }
  .mast-year{
    font-family:'JetBrains Mono', monospace;
    font-weight:500;
    font-size: 20px;
    color: var(--text-dim);
    letter-spacing: 0.05em;
  }

  .util-row{
    display:flex;
    justify-content:flex-end;
    margin-bottom: 18px;
  }
  .pill-btn{
    background: var(--panel-raised);
    border: 1px solid var(--grid-line);
    color: var(--text-dim);
    font-family:'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.04em;
    padding: 7px 13px;
    border-radius: 20px;
    cursor:pointer;
    display:flex; align-items:center; gap:6px;
  }
  .pill-btn:hover{ border-color: var(--brass); color: var(--text); }

  .nav-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap: 10px;
    margin-bottom: 4px;
  }
  .nav-btn{
    background: var(--panel-raised);
    border: 1px solid var(--grid-line);
    color: var(--text);
    width: 42px; height: 42px;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
    display:flex; align-items:center; justify-content:center;
    transition: border-color .15s ease, transform .1s ease;
    flex-shrink: 0;
  }
  .nav-btn:hover{ border-color: var(--brass); }
  .nav-btn:active{ transform: scale(0.94); }
  .nav-btn:focus-visible{ outline: 2px solid var(--teal); outline-offset: 2px; }

  .month-meta{ text-align:center; flex:1; }
  .month-name{
    font-family:'JetBrains Mono', monospace;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 0.02em;
    color: #000000;
  }
  .month-sub{
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 3px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .weekday-row{
    display:grid;
    grid-template-columns: repeat(7, 1fr);
    margin-top: 22px;
    margin-bottom: 6px;
  }
  .weekday-row span{
    text-align:center;
    font-size: 11px;
    color: var(--text-dim);
    font-family:'JetBrains Mono', monospace;
    letter-spacing: 0.08em;
  }

  .grid{
    display:grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
  }
  .day-cell{
    aspect-ratio: 1;
    background: var(--panel);
    border: 1px solid var(--grid-line);
    border-radius: var(--radius);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    position: relative;
    font-family:'JetBrains Mono', monospace;
    font-size: 15px;
    transition: border-color .15s ease, background .15s ease;
  }
  .day-cell:hover{ border-color: var(--brass); }
  .day-cell:focus-visible{ outline: 2px solid var(--teal); outline-offset: 1px; }
  .day-cell.today{
    border-color: var(--teal);
    box-shadow: 0 0 0 1px var(--teal);
    background: rgba(79,179,169,0.08);
    font-weight: 700;
  }
  .day-cell.today .day-num{ color: var(--red); }
  .day-cell.selected{ border-color: var(--brass); background: rgba(201,162,39,0.10); }

  .holiday-star{
    position:absolute;
    top: 3px; left: 4px;
    font-size: 10px;
    color: var(--gold);
    line-height:1;
  }
  .badges{
    position:absolute;
    top: 4px; right: 4px;
    display:flex;
    flex-wrap: wrap-reverse;
    justify-content:flex-end;
    gap: 2px;
    max-width: 60%;
  }
  .badge-dot{
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink:0;
  }

  .week-tick{
    grid-column: 1 / -1;
    height: 1px;
    background: var(--grid-line);
    margin: 2px 0 0 0;
  }

  /* ---- Day view panel (read-only event list) ---- */
  .day-panel{
    margin-top: 22px;
    display:none;
  }
  .day-panel.open{ display:block; }
  .day-panel-date{
    font-family:'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--brass);
    letter-spacing: 0.05em;
    margin-bottom: 10px;
  }
  .item-row{
    display:flex;
    align-items:center;
    gap: 10px;
    background: var(--panel);
    border: 1px solid var(--grid-line);
    border-radius: 8px;
    padding: 9px 11px;
    margin-bottom: 6px;
  }
  .item-swatch{
    width: 9px; height: 9px;
    border-radius: 50%;
    flex-shrink:0;
  }
  .item-star{ color: var(--gold); font-size: 13px; flex-shrink:0; width:9px; text-align:center; }
  .item-time{
    font-family:'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
    flex-shrink:0;
    min-width: 78px;
  }
  .item-title{ flex:1; font-size: 14px; }
  .item-del{
    background:none; border:none; color: var(--text-dim);
    cursor:pointer; font-size: 15px; line-height:1; padding: 2px 4px;
  }
  .item-del:hover{ color: var(--coral); }

  /* ---- Add event section ---- */
  .add-section{ margin-top: 18px; }
  .btn-add{
    width:100%;
    background: var(--panel-raised);
    border: 1px dashed var(--grid-line);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 14px;
    padding: 12px;
    border-radius: var(--radius);
    cursor:pointer;
  }
  .btn-add:hover{ border-color: var(--brass); color: var(--brass); }

  .add-form{
    margin-top: 12px;
    background: var(--panel);
    border: 1px solid var(--grid-line);
    border-radius: var(--radius);
    padding: 16px;
    display:none;
  }
  .add-form.open{ display:block; }

  .type-tabs{ display:flex; gap:8px; margin-bottom: 14px; }
  .type-tab{
    flex:1;
    background: var(--panel-raised);
    border: 1px solid var(--grid-line);
    color: var(--text-dim);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight:600;
    padding: 8px;
    border-radius: 7px;
    cursor:pointer;
  }
  .type-tab.active{ border-color: var(--brass); color: var(--brass); }

  .field-label{
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 5px;
    display:block;
  }
  .field{ margin-bottom: 14px; }
  input[type="text"].input-text{
    width:100%;
    background: var(--bg);
    border: 1px solid var(--grid-line);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    padding: 9px 12px;
  }
  input[type="text"].input-text:focus-visible{ outline: 2px solid var(--teal); }

  .time-row{ display:flex; align-items:center; gap: 8px; }
  .time-group{ display:flex; align-items:center; gap: 4px; }
  input.time-num{
    width: 48px;
    background: var(--bg);
    border: 1px solid var(--grid-line);
    border-radius: 6px;
    color: var(--text);
    font-family:'JetBrains Mono', monospace;
    font-size: 14px;
    padding: 7px 6px;
    text-align:center;
  }
  .time-sep{ color: var(--text-dim); font-family:'JetBrains Mono', monospace; }
  .time-arrow{ color: var(--text-dim); font-size: 13px; padding: 0 2px; }

  .swatch-row{ display:flex; flex-wrap:wrap; gap: 8px; }
  .swatch{
    width: 26px; height: 26px;
    border-radius: 50%;
    cursor:pointer;
    border: 2px solid transparent;
  }
  .swatch.active{ border-color: var(--text); }

  .form-actions{
    display:flex; gap:10px; justify-content:flex-end; margin-top: 4px;
  }
  .btn{
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    border-radius: 7px;
    padding: 9px 16px;
    cursor: pointer;
    border: 1px solid transparent;
    transition: opacity .15s ease;
  }
  .btn:active{ opacity: 0.75; }
  .btn-save{ background: var(--brass); color: #1a1305; }
  .btn-cancel{ background: transparent; color: var(--text-dim); border-color: var(--grid-line); }

  /* ---- Convert modal ---- */
  .modal-backdrop{
    position:fixed; inset:0; background: rgba(0,0,0,0.6);
    display:none; align-items:center; justify-content:center; padding: 20px; z-index: 50;
  }
  .modal-backdrop.open{ display:flex; }
  .modal{
    background: var(--panel);
    border: 1px solid var(--grid-line);
    border-radius: 14px;
    padding: 20px;
    width: 100%; max-width: 380px;
    max-height: 85vh;
    overflow-y:auto;
  }
  .modal-title{
    font-family:'JetBrains Mono', monospace;
    color: var(--brass);
    font-size: 16px;
    letter-spacing: 0.06em;
    margin-bottom: 16px;
  }
  .modal-section{
    border-top: 1px solid var(--grid-line);
    padding-top: 14px;
    margin-top: 14px;
  }
  .modal-section:first-of-type{ border-top:none; padding-top:0; margin-top:0; }
  .modal-sub{
    font-size: 12px; color: var(--text-dim); text-transform:uppercase;
    letter-spacing: 0.06em; margin-bottom: 10px;
  }
  input[type="date"], select.input-select, input[type="number"].input-num{
    background: var(--bg);
    border: 1px solid var(--grid-line);
    border-radius: 7px;
    color: var(--text);
    font-family:'JetBrains Mono', monospace;
    font-size: 13px;
    padding: 8px 9px;
  }
  select.input-select{ font-family:'Inter',sans-serif; }
  .sym-input-row{ display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
  .sym-input-row input[type="number"]{ width: 64px; }
  .convert-result{
    margin-top: 10px;
    font-family:'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--teal);
    min-height: 18px;
  }
  .modal-close{
    display:block; margin: 18px auto 0; background:none; border:1px solid var(--grid-line);
    color: var(--text-dim); border-radius: 7px; padding: 8px 20px; cursor:pointer; font-family:'Inter',sans-serif;
  }

  .status{
    text-align:center;
    color: var(--text-dim);
    font-size: 12px;
    margin-top: 30px;
    font-family:'JetBrains Mono', monospace;
  }

  @media (max-width: 360px){
    .day-cell{ font-size: 13px; }
    .month-name{ font-size: 19px; }
  }
</style>
</head>
<body>
<div id="app">

  <div class="mast">
    <div class="mast-title">SYMMETRY454</div>
    <div class="mast-year" id="yearLabel">—</div>
  </div>

  <div class="util-row">
    <button class="pill-btn" id="convertBtn">⇄ Convert dates</button>
  </div>

  <div class="nav-row">
    <button class="nav-btn" id="prevBtn" aria-label="Previous month">&#8592;</button>
    <div class="month-meta">
      <div class="month-name" id="monthLabel">—</div>
      <div class="month-sub" id="monthSub">—</div>
    </div>
    <button class="nav-btn" id="nextBtn" aria-label="Next month">&#8594;</button>
  </div>

  <div class="weekday-row">
    <span>MON</span><span>TUE</span><span>WED</span><span>THU</span><span>FRI</span><span>SAT</span><span>SUN</span>
  </div>

  <div class="grid" id="grid"></div>

  <div class="day-panel" id="dayPanel">
    <div class="day-panel-date" id="dayPanelDate">—</div>
    <div id="dayPanelList"></div>
  </div>

  <div class="add-section">
    <button class="btn-add" id="addToggleBtn">+ Add event</button>

    <div class="add-form" id="addForm">
      <div class="type-tabs">
        <button class="type-tab active" id="tabEvent" data-type="event">Event</button>
        <button class="type-tab" id="tabHoliday" data-type="holiday">Holiday / Celebration</button>
      </div>

      <div id="eventFields">
        <div class="field">
          <span class="field-label">Title</span>
          <input type="text" class="input-text" id="titleInput" placeholder="Event title" />
        </div>
        <div class="field">
          <span class="field-label">Start (decimal time)</span>
          <div class="time-row">
            <div class="time-group">
              <input type="number" class="time-num" id="startH" min="0" max="9" value="0" />
              <span class="time-sep">:</span>
              <input type="number" class="time-num" id="startM" min="0" max="99" value="0" />
            </div>
          </div>
        </div>
        <div class="field">
          <span class="field-label">End (decimal time)</span>
          <div class="time-row">
            <div class="time-group">
              <input type="number" class="time-num" id="endH" min="0" max="9" value="0" />
              <span class="time-sep">:</span>
              <input type="number" class="time-num" id="endM" min="0" max="99" value="0" />
            </div>
          </div>
        </div>
        <div class="field">
          <span class="field-label">Colour</span>
          <div class="swatch-row" id="swatchRow"></div>
        </div>
      </div>

      <div id="holidayFields" style="display:none;">
        <div class="field">
          <span class="field-label">Holiday / celebration name</span>
          <input type="text" class="input-text" id="holidayInput" placeholder="e.g. Founders' Day" />
        </div>
      </div>

      <div class="form-actions">
        <button class="btn btn-cancel" id="cancelFormBtn">Cancel</button>
        <button class="btn btn-save" id="saveFormBtn">Save</button>
      </div>
    </div>
  </div>

  <div class="status" id="status">loading…</div>
</div>

<!-- Convert modal -->
<div class="modal-backdrop" id="convertBackdrop">
  <div class="modal">
    <div class="modal-title">CONVERT DATES</div>

    <div class="modal-section">
      <div class="modal-sub">Gregorian → Symmetry454</div>
      <input type="date" id="gregInput" />
      <div class="convert-result" id="gregResult"></div>
    </div>

    <div class="modal-section">
      <div class="modal-sub">Symmetry454 → Gregorian</div>
      <div class="sym-input-row">
        <input type="number" class="input-num" id="symYear" placeholder="Year" />
        <select class="input-select" id="symMonth"></select>
        <input type="number" class="input-num" id="symDay" placeholder="Day" min="1" />
      </div>
      <div class="convert-result" id="symResult"></div>
    </div>

    <button class="modal-close" id="closeConvertBtn">Close</button>
  </div>
</div>

<script>
(function(){
  const MONTH_NAMES = ["January","February","March","April","May","June",
                        "July","August","September","October","November","December"];
  const DAY_MS = 86400000;
  const PALETTE = [
    {name:'Coral',  hex:'#e2704a'},
    {name:'Brass',  hex:'#c9a227'},
    {name:'Teal',   hex:'#4fb3a9'},
    {name:'Sky',    hex:'#5b8dd9'},
    {name:'Violet', hex:'#9575cd'},
    {name:'Sage',   hex:'#7cb083'},
    {name:'Rose',   hex:'#d97ba0'},
    {name:'Amber',  hex:'#e0a458'},
  ];

  // ---------- Symmetry454 date math (all in UTC to stay timezone-agnostic) ----------

  function nearestMondayUTC(year){
    const jan1 = Date.UTC(year, 0, 1);
    const dow = new Date(jan1).getUTCDay();       // Sun=0..Sat=6
    const isoDow = (dow + 6) % 7;                  // Mon=0..Sun=6
    const offset = isoDow <= 3 ? -isoDow : (7 - isoDow);
    return jan1 + offset * DAY_MS;
  }

  function sym454Leap(year){
    return ((52 * year + 146) % 293) < 52;
  }

  function monthLengths(year){
    const leap = sym454Leap(year);
    return [28,35,28, 28,35,28, 28,35,28, 28,35, 28 + (leap ? 7 : 0)];
  }

  function gregorianToSym454(ts){
    let year = new Date(ts).getUTCFullYear();
    let start = nearestMondayUTC(year);
    if (ts < start){
      year -= 1;
      start = nearestMondayUTC(year);
    } else {
      const lengths = monthLengths(year);
      const total = lengths.reduce((a,b)=>a+b,0);
      const end = start + (total - 1) * DAY_MS;
      if (ts > end){
        year += 1;
        start = nearestMondayUTC(year);
      }
    }
    const lengths = monthLengths(year);
    let dayOfYear = Math.round((ts - start) / DAY_MS) + 1;
    let d = dayOfYear;
    for (let m = 0; m < 12; m++){
      if (d <= lengths[m]) return { year, month: m, day: d };
      d -= lengths[m];
    }
  }

  function sym454ToGregorian(year, month, day){
    const start = nearestMondayUTC(year);
    const lengths = monthLengths(year);
    let dayOfYear = day;
    for (let i = 0; i < month; i++) dayOfYear += lengths[i];
    return start + (dayOfYear - 1) * DAY_MS;
  }

  function isoKey(ts){
    const d = new Date(ts);
    const y = d.getUTCFullYear();
    const m = String(d.getUTCMonth()+1).padStart(2,'0');
    const day = String(d.getUTCDate()).padStart(2,'0');
    return `${y}-${m}-${day}`;
  }

  function todayTimestampUTC7(){
    const shifted = Date.now() - 7*3600*1000;
    const s = new Date(shifted);
    return Date.UTC(s.getUTCFullYear(), s.getUTCMonth(), s.getUTCDate());
  }

  function timeVal(t){ return t.h*100 + t.m; }
  function fmtTime(t){ return `${t.h}:${String(t.m).padStart(2,'0')}`; }
  function newId(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }

  // ---------- App state ----------

  let events = {};       // { "YYYY-MM-DD": [ {id,type:'event',title,color,start:{h,m},end:{h,m}} | {id,type:'holiday',title} ] }
  let viewYear, viewMonth;
  let todayTs = todayTimestampUTC7();
  let todayKey = isoKey(todayTs);
  let selectedKey = null;
  let selectedColor = PALETTE[0].hex;
  let activeType = 'event';

  const els = {
    yearLabel: document.getElementById('yearLabel'),
    monthLabel: document.getElementById('monthLabel'),
    monthSub: document.getElementById('monthSub'),
    grid: document.getElementById('grid'),
    prevBtn: document.getElementById('prevBtn'),
    nextBtn: document.getElementById('nextBtn'),
    dayPanel: document.getElementById('dayPanel'),
    dayPanelDate: document.getElementById('dayPanelDate'),
    dayPanelList: document.getElementById('dayPanelList'),
    addToggleBtn: document.getElementById('addToggleBtn'),
    addForm: document.getElementById('addForm'),
    tabEvent: document.getElementById('tabEvent'),
    tabHoliday: document.getElementById('tabHoliday'),
    eventFields: document.getElementById('eventFields'),
    holidayFields: document.getElementById('holidayFields'),
    titleInput: document.getElementById('titleInput'),
    startH: document.getElementById('startH'),
    startM: document.getElementById('startM'),
    endH: document.getElementById('endH'),
    endM: document.getElementById('endM'),
    swatchRow: document.getElementById('swatchRow'),
    holidayInput: document.getElementById('holidayInput'),
    cancelFormBtn: document.getElementById('cancelFormBtn'),
    saveFormBtn: document.getElementById('saveFormBtn'),
    status: document.getElementById('status'),
    convertBtn: document.getElementById('convertBtn'),
    convertBackdrop: document.getElementById('convertBackdrop'),
    closeConvertBtn: document.getElementById('closeConvertBtn'),
    gregInput: document.getElementById('gregInput'),
    gregResult: document.getElementById('gregResult'),
    symYear: document.getElementById('symYear'),
    symMonth: document.getElementById('symMonth'),
    symDay: document.getElementById('symDay'),
    symResult: document.getElementById('symResult'),
  };

  // build swatches
  PALETTE.forEach(c => {
    const sw = document.createElement('div');
    sw.className = 'swatch';
    sw.style.background = c.hex;
    sw.dataset.hex = c.hex;
    sw.title = c.name;
    if (c.hex === selectedColor) sw.classList.add('active');
    sw.addEventListener('click', () => {
      selectedColor = c.hex;
      document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
      sw.classList.add('active');
    });
    els.swatchRow.appendChild(sw);
  });

  // build sym month select
  MONTH_NAMES.forEach((n,i) => {
    const opt = document.createElement('option');
    opt.value = i; opt.textContent = n;
    els.symMonth.appendChild(opt);
  });

  function getDayItems(key){ return events[key] || []; }

  function sortedDayItems(key){
    const items = getDayItems(key);
    const holidays = items.filter(i => i.type === 'holiday');
    const evs = items.filter(i => i.type === 'event').sort((a,b) => timeVal(a.start) - timeVal(b.start));
    return [...holidays, ...evs];
  }

  async function persist(){
    try{
      const result = await window.storage.set('events', JSON.stringify(events), false);
      if (!result) console.error('Storage set returned no result');
    }catch(err){
      console.error('Failed to save events', err);
      els.status.textContent = 'could not save — try again';
    }
  }

  async function loadEvents(){
    try{
      const result = await window.storage.get('events', false);
      events = result && result.value ? JSON.parse(result.value) : {};
    }catch(err){
      events = {};
    }
  }

  function renderHeader(){
    els.yearLabel.textContent = viewYear;
    els.monthLabel.textContent = MONTH_NAMES[viewMonth];
    const lengths = monthLengths(viewYear);
    const weeks = lengths[viewMonth] / 7;
    const quarter = Math.floor(viewMonth / 3) + 1;
    const leapNote = (viewMonth === 11 && sym454Leap(viewYear)) ? ' · leap week appended' : '';
    els.monthSub.textContent = `Q${quarter} · ${weeks} complete weeks${leapNote}`;
  }

  function renderGrid(){
    els.grid.innerHTML = '';
    const lengths = monthLengths(viewYear);
    const total = lengths[viewMonth];
    for (let day = 1; day <= total; day++){
      const ts = sym454ToGregorian(viewYear, viewMonth, day);
      const key = isoKey(ts);
      const cell = document.createElement('div');
      cell.className = 'day-cell';
      cell.tabIndex = 0;
      if (key === todayKey) cell.classList.add('today');
      if (key === selectedKey) cell.classList.add('selected');

      const num = document.createElement('span');
      num.className = 'day-num';
      num.textContent = day;
      cell.appendChild(num);

      const items = getDayItems(key);
      if (items.some(i => i.type === 'holiday')){
        const star = document.createElement('div');
        star.className = 'holiday-star';
        star.textContent = '★';
        cell.appendChild(star);
      }
      const colors = [...new Set(items.filter(i => i.type === 'event').map(i => i.color))];
      if (colors.length){
        const badges = document.createElement('div');
        badges.className = 'badges';
        colors.forEach(c => {
          const dot = document.createElement('span');
          dot.className = 'badge-dot';
          dot.style.background = c;
          badges.appendChild(dot);
        });
        cell.appendChild(badges);
      }

      cell.addEventListener('click', () => selectDay(ts));
      cell.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' '){ e.preventDefault(); selectDay(ts); }
      });
      els.grid.appendChild(cell);
      if (day % 7 === 0 && day !== total){
        const tick = document.createElement('div');
        tick.className = 'week-tick';
        els.grid.appendChild(tick);
      }
    }
  }

  function renderDayPanel(){
    if (!selectedKey){
      els.dayPanel.classList.remove('open');
      return;
    }
    els.dayPanel.classList.add('open');
    const d = new Date(selectedTsFromKey(selectedKey));
    els.dayPanelDate.textContent = d.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', timeZone:'UTC' });

    els.dayPanelList.innerHTML = '';
    const items = sortedDayItems(selectedKey);
    items.forEach(item => {
      const row = document.createElement('div');
      row.className = 'item-row';
      if (item.type === 'holiday'){
        const star = document.createElement('span');
        star.className = 'item-star';
        star.textContent = '★';
        row.appendChild(star);
        const title = document.createElement('span');
        title.className = 'item-title';
        title.textContent = item.title;
        row.appendChild(title);
      } else {
        const swatch = document.createElement('span');
        swatch.className = 'item-swatch';
        swatch.style.background = item.color;
        row.appendChild(swatch);
        const time = document.createElement('span');
        time.className = 'item-time';
        time.textContent = `${fmtTime(item.start)}–${fmtTime(item.end)}`;
        row.appendChild(time);
        const title = document.createElement('span');
        title.className = 'item-title';
        title.textContent = item.title;
        row.appendChild(title);
      }
      const del = document.createElement('button');
      del.className = 'item-del';
      del.textContent = '×';
      del.addEventListener('click', async () => {
        events[selectedKey] = getDayItems(selectedKey).filter(i => i.id !== item.id);
        if (events[selectedKey].length === 0) delete events[selectedKey];
        await persist();
        render();
        renderDayPanel();
      });
      row.appendChild(del);
      els.dayPanelList.appendChild(row);
    });
  }

  // helper: recover a UTC timestamp from an ISO key
  function selectedTsFromKey(key){
    const [y,m,d] = key.split('-').map(Number);
    return Date.UTC(y, m-1, d);
  }

  let selectedTs = null;

  function selectDay(ts){
    selectedTs = ts;
    selectedKey = isoKey(ts);
    closeAddForm();
    render();
    renderDayPanel();
  }

  function render(){
    renderHeader();
    renderGrid();
  }

  els.prevBtn.addEventListener('click', () => {
    viewMonth -= 1;
    if (viewMonth < 0){ viewMonth = 11; viewYear -= 1; }
    render();
  });
  els.nextBtn.addEventListener('click', () => {
    viewMonth += 1;
    if (viewMonth > 11){ viewMonth = 0; viewYear += 1; }
    render();
  });

  // ---------- Add form ----------

  function openAddForm(){
    if (!selectedKey){
      selectDay(todayTs);
    }
    els.titleInput.value = '';
    els.holidayInput.value = '';
    els.startH.value = 0; els.startM.value = 0;
    els.endH.value = 0; els.endM.value = 0;
    activeType = 'event';
    els.tabEvent.classList.add('active');
    els.tabHoliday.classList.remove('active');
    els.eventFields.style.display = '';
    els.holidayFields.style.display = 'none';
    els.addForm.classList.add('open');
  }
  function closeAddForm(){
    els.addForm.classList.remove('open');
  }

  els.addToggleBtn.addEventListener('click', openAddForm);
  els.cancelFormBtn.addEventListener('click', closeAddForm);

  els.tabEvent.addEventListener('click', () => {
    activeType = 'event';
    els.tabEvent.classList.add('active');
    els.tabHoliday.classList.remove('active');
    els.eventFields.style.display = '';
    els.holidayFields.style.display = 'none';
  });
  els.tabHoliday.addEventListener('click', () => {
    activeType = 'holiday';
    els.tabHoliday.classList.add('active');
    els.tabEvent.classList.remove('active');
    els.eventFields.style.display = 'none';
    els.holidayFields.style.display = '';
  });

  function clampInt(val, min, max){
    let n = parseInt(val, 10);
    if (isNaN(n)) n = min;
    return Math.max(min, Math.min(max, n));
  }

  els.saveFormBtn.addEventListener('click', async () => {
    if (!selectedKey) return;
    if (!events[selectedKey]) events[selectedKey] = [];

    if (activeType === 'holiday'){
      const name = els.holidayInput.value.trim();
      if (!name) return;
      events[selectedKey].push({ id: newId(), type: 'holiday', title: name });
    } else {
      const title = els.titleInput.value.trim();
      if (!title) return;
      const start = { h: clampInt(els.startH.value, 0, 9), m: clampInt(els.startM.value, 0, 99) };
      const end   = { h: clampInt(els.endH.value, 0, 9),   m: clampInt(els.endM.value, 0, 99) };
      events[selectedKey].push({ id: newId(), type: 'event', title, color: selectedColor, start, end });
    }

    await persist();
    closeAddForm();
    render();
    renderDayPanel();
  });

  // ---------- Convert modal ----------

  els.convertBtn.addEventListener('click', () => {
    els.convertBackdrop.classList.add('open');
  });
  els.closeConvertBtn.addEventListener('click', () => {
    els.convertBackdrop.classList.remove('open');
  });
  els.convertBackdrop.addEventListener('click', (e) => {
    if (e.target === els.convertBackdrop) els.convertBackdrop.classList.remove('open');
  });

  els.gregInput.addEventListener('change', () => {
    if (!els.gregInput.value){ els.gregResult.textContent = ''; return; }
    const [y,m,d] = els.gregInput.value.split('-').map(Number);
    const ts = Date.UTC(y, m-1, d);
    const s = gregorianToSym454(ts);
    els.gregResult.textContent = `${MONTH_NAMES[s.month]} ${s.day}, ${s.year}`;
  });

  function updateSymResult(){
    const y = parseInt(els.symYear.value, 10);
    const m = parseInt(els.symMonth.value, 10);
    const d = parseInt(els.symDay.value, 10);
    if (isNaN(y) || isNaN(m) || isNaN(d)){ els.symResult.textContent = ''; return; }
    const lengths = monthLengths(y);
    if (d < 1 || d > lengths[m]){
      els.symResult.textContent = `${MONTH_NAMES[m]} only has ${lengths[m]} days in ${y}`;
      return;
    }
    const ts = sym454ToGregorian(y, m, d);
    const gd = new Date(ts);
    els.symResult.textContent = gd.toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric', timeZone:'UTC' });
  }
  els.symYear.addEventListener('input', updateSymResult);
  els.symMonth.addEventListener('change', updateSymResult);
  els.symDay.addEventListener('input', updateSymResult);

  // Keep "today" accurate if the app is left open across the UTC-7 day boundary
  setInterval(() => {
    const newTs = todayTimestampUTC7();
    const newKey = isoKey(newTs);
    if (newKey !== todayKey){
      todayTs = newTs;
      todayKey = newKey;
      render();
    }
  }, 60000);

  async function init(){
    await loadEvents();
    const todaySym = gregorianToSym454(todayTs);
    viewYear = todaySym.year;
    viewMonth = todaySym.month;
    els.status.textContent = '';
    render();
  }

  init();
})();
</script>
</body>
</html>
